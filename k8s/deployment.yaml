apiVersion: apps/v1
kind: Deployment
metadata:
  name: old-school-homepage
  labels:
    app: old-school-homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: old-school-homepage
  template:
    metadata:
      labels:
        app: old-school-homepage
    spec:
      tolerations:
        - key: "workload-type"
          operator: "Equal"
          value: "untrusted"
          effect: "NoSchedule"
      nodeSelector:
        kubernetes.io/hostname: k3s-apps
      containers:
        - name: web
          image: registry.k8s.ts.conrad-klaus.de/old-school-homepage:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: old-school-homepage
spec:
  type: ClusterIP
  selector:
    app: old-school-homepage
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: old-school-homepage
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - oldschool.conrad-klaus.de
      secretName: oldschool-tls
  rules:
    - host: oldschool.conrad-klaus.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: old-school-homepage
                port:
                  number: 80
